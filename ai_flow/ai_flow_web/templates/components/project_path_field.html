{% macro project_path_field(value='', label='Project path', required=false) %}
  <div class="field project-path-field">
    <label class="label">{{ label }}</label>
    <div class="project-path-picker">
      <div class="control is-expanded">
        <input
          class="input project-path-input"
          type="text"
          name="project_path"
          value="{{ value }}"
          list="project-path-options"
          {% if required %}required{% endif %}
          placeholder="Start typing or pick from the picker"
        >
      </div>
      <div class="control">
        <button
          type="button"
          class="button is-light"
          data-project-picker-toggle
        >
          Browse
        </button>
      </div>
    </div>
    <datalist id="project-path-options"></datalist>
    <div class="project-picker-dropdown" data-project-picker-dropdown hidden>
      <div class="project-picker-list" data-project-picker-list>
        <p class="is-size-7 has-text-grey">Loading projects…</p>
      </div>
    </div>
    <p class="help">Selection is remembered in this browser.</p>
  </div>
{% endmacro %}
