{% extends "base.html" %}

{% block content %}
  <div class="panel-card form-card">
    <h1 class="title is-4">{{ title }}</h1>
    <p class="subtitle is-6">{{ note }}</p>

    <div class="table-container">
      <table class="table is-fullwidth is-striped">
        <tbody>
          {% for item in fields %}
            <tr>
              <th>{{ item.label }}</th>
              <td>{{ item.value }}</td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>

    <form method="post" action="{{ form_action }}">
      {% for item in hidden_fields %}
        <input type="hidden" name="{{ item.name }}" value="{{ item.value }}">
      {% endfor %}

      <div class="field">
        <label class="checkbox">
          <input type="checkbox" name="confirm" value="yes" required>
          I understand this operation will change files.
        </label>
      </div>

      <div class="buttons">
        <button class="button is-danger" type="submit">Confirm and run</button>
        <a class="button is-light" href="{{ back_url }}">Back</a>
      </div>
    </form>
  </div>
{% endblock %}
