<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400px" height="800px" viewBox="0 0 400 800">
  <rect x="20" y="50" width="120" height="632.5" fill="#f6f6f6" stroke="#000"/>
  <!-- floor and ceiling lines -->
  <line x1="10" y1="50" x2="200" y2="50" stroke="#000" stroke-width="2"/>
  <line x1="10" y1="682.5" x2="200" y2="682.5" stroke="#000" stroke-width="2"/>

  <!-- window -->
  <rect x="150" y="170.0" width="60" height="392.5" fill="#87CEFA" stroke="#005"/>
  <text x="150" y="164.0" font-size="12">Window bottom = 480 mm</text>
  <text x="150" y="576.5" font-size="12">Window top = 2050 mm</text>

  <!-- door -->
  <rect x="250" y="50" width="60" height="525.0" fill="#deb887" stroke="#6b3"/>
  <text x="250" y="589.0" font-size="12">Door h = 2100 mm</text>

  <!-- vertical scale labels -->
  <text x="10" y="62" font-size="11">0 mm (floor)</text>
  <text x="10" y="174.0" font-size="11">480</text>
  <text x="10" y="446.5" font-size="11">2050</text>
  <text x="10" y="686.5" font-size="11">2530 (ceiling)</text>
</svg>
