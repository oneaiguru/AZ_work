<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880px" height="880px" viewBox="0 0 880 880">
  <rect x="20" y="20" width="840.0" height="840.0" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <!-- inner finished area (after walls) -->
  <rect x="56.0" y="56.0" width="768.0" height="768.0" fill="#f8f8f8" stroke="#333" stroke-width="1"/>

  <!-- Window on west wall -->
  <rect x="19" y="437.0" width="36.6" height="282.0" fill="#87CEFA" stroke="#005" stroke-width="1"/>
  <text x="25" y="449.0" font-size="12">Window W1 (bottom offset 480 mm, h=1570 mm)</text>

  <!-- Door on south wall -->
  <rect x="590.0" y="824.0" width="270.0" height="36.0" fill="#deb887" stroke="#6b3" stroke-width="1"/>
  <text x="590.0" y="838.0" font-size="12">Door D1 h=2100 mm</text>

  <!-- Dimension labels -->
  <line x1="20" y1="868.0" x2="860.0" y2="868.0" stroke="#000" stroke-width="1"/>
  <text x="410.0" y="884.0" font-size="12">Outer = 2800 mm</text>

  <!-- Legend -->
  <rect x="660" y="20" width="200" height="120" fill="#fff" stroke="#999"/>
  <text x="670" y="40" font-size="12">Legend:</text>
  <rect x="675" y="50" width="12" height="12" fill="#87CEFA" stroke="#005"/>
  <text x="695" y="62" font-size="11">Window opening</text>
  <rect x="675" y="70" width="12" height="12" fill="#deb887" stroke="#6b3"/>
  <text x="695" y="82" font-size="11">Door opening</text>
</svg>
